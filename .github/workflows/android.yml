name: Android CI Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Ensure Gradle wrapper exists
        run: |
          if [ ! -f ./gradlew ]; then
            echo "Gradle wrapper 'gradlew' not found. Attempting to generate it."
            # Install Gradle if not already available on the runner.
            # `ubuntu-latest` usually has an older version of 'gradle' or it can be installed via apt.
            sudo apt-get update
            sudo apt-get install -y gradle
            # Generate the wrapper script. The version (8.5) is derived from gradle/wrapper/gradle-wrapper.properties
            gradle wrapper --gradle-version 8.5
          fi

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk